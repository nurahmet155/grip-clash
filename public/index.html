<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Grip Clash Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #111; color: white; padding-top: 50px; }
    button { font-size: 30px; padding: 20px 40px; border-radius: 10px; margin-top: 20px; cursor: pointer; }
    input { font-size: 20px; padding: 10px; text-align: center; border-radius: 5px; border: none; }
    .btn-tap { font-size: 40px; padding: 50px; border-radius: 50%; background: #ff4757; color: white; border: none; }
  </style>
</head>
<body>

<h1>GRIP CLASH ONLINE</h1>

<div>
  <input id="room" placeholder="ID Комнаты" />
  <button onclick="join()">Войти</button>
</div>

<h2 id="status">Ожидание игроков...</h2>
<h3 id="score">0 - 0</h3>

<button class="btn-tap" onclick="tap()">КЛИК!</button>

<script>
const socket = io();
let roomId = null;

function join() {
  roomId = document.getElementById('room').value;
  if(roomId.trim() !== "") {
    socket.emit('joinRoom', roomId);
  }
}

socket.on('state', (room) => {
  document.getElementById('score').innerText = room.score1 + ' - ' + room.score2;
  document.getElementById('status').innerText = 'Битва началась!';
});

socket.on('gameOver', (data) => {
  document.getElementById('status').innerText = 'Игра окончена! Победитель: ' + data.winner;
});

function tap() {
  if (roomId) {
    socket.emit('tap', roomId);
  } else {
    alert("Сначала введи ID комнаты и нажми Войти!");
  }
}
</script>

</body>
</html>
